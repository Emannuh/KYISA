{% extends 'base.html' %}
{% block title %}Delete {{ object_type }} — KYISA Media{% endblock %}

{% block content %}
<div class="portal-page-head">
    <div class="portal-breadcrumb">
        <a href="{% url 'media_dashboard' %}">Media</a>
        <span class="sep"><i class="bi bi-chevron-right"></i></span>
        <span>Delete {{ object_type }}</span>
    </div>
    <h1><i class="bi bi-exclamation-triangle" style="color:#C62828"></i> Confirm Deletion</h1>
</div>

<div class="portal-form" style="max-width:500px">
    <div class="portal-form-card" style="border-top:3px solid #C62828">
        <div class="portal-form-body" style="text-align:center">
            <i class="bi bi-exclamation-triangle" style="font-size:2.5rem;color:#C62828;margin-bottom:.75rem;display:block"></i>
            <h3 style="font-size:1.1rem;font-weight:700;margin-bottom:.35rem">Delete {{ object_type }}?</h3>
            <p style="font-size:.85rem;color:#666;margin-bottom:1.25rem">This action cannot be undone.</p>
            <div style="background:#f8f8f8;border-radius:10px;padding:1rem;margin-bottom:1.25rem;font-weight:600">
                {{ object }}
            </div>
            <form method="post">
                {% csrf_token %}
                <div class="pbtn-group" style="justify-content:center">
                    <a href="{% url back_url %}" class="pbtn pbtn-secondary">Cancel</a>
                    <button type="submit" class="pbtn pbtn-danger"><i class="bi bi-trash"></i> Delete</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
